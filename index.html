<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 確保行動裝置上的縮放與顯示正確 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>琬鈴的踩地雷遊戲</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation; /* 停用雙擊縮放，優化手機體驗 */
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(20, 25, 40, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        /* 開場動畫文字特效 */
        .intro-text {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: bold;
            color: transparent;
            background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%);
            -webkit-background-clip: text;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate, float 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(168, 192, 255, 0.3);
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(168, 192, 255, 0.2); }
            to { text-shadow: 0 0 30px rgba(168, 192, 255, 0.8), 0 0 10px rgba(168, 192, 255, 0.5); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .fade-out {
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* 遊戲網格樣式 */
        .mine-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            background-color: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 4px;
        }

        .cell {
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.2);
            /* 強制固定格子為正方形，避免因為表情符號或數字撐開格子 */
            aspect-ratio: 1 / 1;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
        }

        .cell:hover:not(.revealed) {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .cell.revealed {
            background-color: rgba(0, 0, 0, 0.4);
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.5);
            cursor: default;
        }

        .cell.mine {
            background-color: #ef4444 !important; /* Tailwind red-500 */
            box-shadow: 0 0 10px #ef4444;
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
            40%, 60% { transform: translate3d(8px, 0, 0); }
        }

        /* 數字顏色對應 */
        .text-num-1 { color: #3b82f6; } /* blue-500 */
        .text-num-2 { color: #22c55e; } /* green-500 */
        .text-num-3 { color: #ef4444; } /* red-500 */
        .text-num-4 { color: #a855f7; } /* purple-500 */
        .text-num-5 { color: #f97316; } /* orange-500 */
        .text-num-6 { color: #06b6d4; } /* cyan-500 */
        .text-num-7 { color: #eab308; } /* yellow-500 */
        .text-num-8 { color: #ec4899; } /* pink-500 */

        /* 自訂捲軸 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px;}
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px;}
    </style>
</head>
<body class="text-white">

    <!-- 3D 背景容器 -->
    <canvas id="bg-canvas"></canvas>

    <!-- UI 總容器 -->
    <div id="ui-container" class="relative z-10 w-full h-full flex justify-center items-center p-4">
        
        <!-- 階段 0: 開場動畫 -->
        <div id="intro-screen" class="absolute inset-0 flex justify-center items-center bg-black bg-opacity-80 transition-opacity duration-1000 z-50">
            <h1 class="intro-text text-center">琬鈴的<br>踩地雷遊戲</h1>
        </div>

        <!-- 階段 1: 設定階段 -->
        <div id="setup-screen" class="glass-panel rounded-2xl p-6 md:p-8 w-full max-w-lg hidden flex flex-col gap-5">
            <div class="text-center">
                <h2 class="text-2xl font-bold mb-2 text-indigo-300">遊戲設定</h2>
                <p class="text-sm text-gray-300">請設定地雷數量與精確位置</p>
            </div>

            <!-- 設定總數 -->
            <div class="flex items-center justify-between bg-white bg-opacity-10 p-3 rounded-lg">
                <label class="font-medium text-gray-200">地雷總數量 (顆)</label>
                <input type="number" id="mine-count-input" value="10" min="1" max="99" class="w-20 bg-gray-800 text-center text-white rounded p-1 border border-gray-600 focus:outline-none focus:border-indigo-400">
            </div>

            <!-- 輸入座標區塊 -->
            <div class="bg-white bg-opacity-5 p-4 rounded-lg border border-white border-opacity-10">
                <h3 class="text-lg font-semibold mb-3 text-indigo-200 flex justify-between">
                    <span>輸入地雷位置</span>
                    <span class="text-sm bg-indigo-600 px-2 py-1 rounded text-white" id="mine-progress">0 / 10</span>
                </h3>
                <div class="flex gap-2 mb-3">
                    <div class="flex-1">
                        <label class="text-xs text-gray-400 block mb-1">行 (1-10)</label>
                        <input type="number" id="input-row" min="1" max="10" placeholder="1~10" class="w-full bg-gray-800 text-white rounded p-2 border border-gray-600 focus:outline-none focus:border-indigo-400">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs text-gray-400 block mb-1">列 (1-10)</label>
                        <input type="number" id="input-col" min="1" max="10" placeholder="1~10" class="w-full bg-gray-800 text-white rounded p-2 border border-gray-600 focus:outline-none focus:border-indigo-400">
                    </div>
                    <div class="flex items-end">
                        <button id="add-mine-btn" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-2 px-4 rounded transition-colors h-[42px]">加入</button>
                    </div>
                </div>
                <!-- 錯誤訊息提示 -->
                <p id="setup-error" class="text-red-400 text-sm hidden mb-2"></p>
                
                <!-- 已加入地雷清單 -->
                <div class="h-32 overflow-y-auto custom-scrollbar bg-black bg-opacity-30 rounded p-2">
                    <ul id="mine-list" class="space-y-1 text-sm">
                        <!-- 動態產生清單項目 -->
                        <li class="text-gray-500 text-center mt-10">尚未加入任何地雷</li>
                    </ul>
                </div>
            </div>

            <button id="start-game-btn" class="w-full bg-gray-600 text-gray-300 font-bold py-3 rounded-lg transition-all cursor-not-allowed" disabled>
                請先完成地雷設定
            </button>
        </div>

        <!-- 階段 2: 遊戲階段 -->
        <div id="game-screen" class="glass-panel rounded-2xl p-4 md:p-6 w-full max-w-xl hidden flex flex-col gap-4 items-center">
            
            <div class="w-full flex justify-between items-center bg-white bg-opacity-10 px-4 py-2 rounded-lg text-lg font-mono border border-white border-opacity-10">
                <div class="flex items-center gap-2 text-red-400">
                    <span>💣</span> <span id="mines-left-display">0</span>
                </div>
                <div class="text-indigo-300 font-bold text-xl">10 × 10</div>
                <div class="flex items-center gap-2 text-green-400">
                    <span>⏱️</span> <span id="timer-display">000</span>
                </div>
            </div>

            <!-- 手機友善的模式切換 (挖掘 vs 插旗) -->
            <div class="bg-black bg-opacity-40 p-1 rounded-lg flex w-full max-w-xs cursor-pointer">
                <button id="mode-dig" class="flex-1 py-1.5 rounded-md bg-indigo-500 text-white font-bold transition-all shadow-lg text-sm">⛏️ 點擊挖掘</button>
                <button id="mode-flag" class="flex-1 py-1.5 rounded-md text-gray-400 font-bold transition-all text-sm">🚩 標記地雷</button>
            </div>

            <!-- 網格容器 -->
            <div id="board" class="mine-grid">
                <!-- Javascript 動態生成格數 -->
            </div>

            <button onclick="resetToSetup()" class="text-gray-400 text-sm hover:text-white transition-colors mt-2 underline">
                重新設定地雷並重新開始
            </button>
        </div>

        <!-- 階段 3: 結算彈跳視窗 -->
        <div id="game-over-modal" class="absolute inset-0 z-50 flex items-center justify-center bg-black bg-opacity-60 hidden backdrop-blur-sm">
            <div class="glass-panel rounded-2xl p-8 max-w-sm w-[90%] text-center transform scale-95 transition-transform duration-300" id="modal-content">
                <div id="modal-icon" class="text-6xl mb-4">💥</div>
                <h2 id="modal-title" class="text-3xl font-bold mb-2 text-red-400">踩到地雷了！</h2>
                <p id="modal-msg" class="text-gray-300 mb-6">遊戲結束，整個區域發生爆炸。</p>
                <button onclick="resetToSetup()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg shadow-indigo-500/30">
                    回到設定畫面
                </button>
            </div>
        </div>

    </div>

    <script>
        /* =========================================
           1. Three.js 3D 動態背景設定
           ========================================= */
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        // 創建粒子系統
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 800;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
            // 讓粒子散佈在較廣的空間
            posArray[i] = (Math.random() - 0.5) * 100;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        // 建立稍微發光的材質
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.2,
            color: 0x8a9cff,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // 滑鼠互動效果
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = event.clientX / window.innerWidth - 0.5;
            mouseY = event.clientY / window.innerHeight - 0.5;
        });

        // 動畫循環
        function animateBg() {
            requestAnimationFrame(animateBg);
            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.0005;
            
            // 輕微跟隨滑鼠移動視角
            camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 5 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }
        animateBg();

        // 視窗縮放處理
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


        /* =========================================
           2. 遊戲狀態與邏輯
           ========================================= */
        
        // 核心變數
        const ROWS = 10;
        const COLS = 10;
        let targetMineCount = 10;
        let mineCoordinates = []; // 儲存 {row, col} 格式為 0-9
        
        let boardData = []; // 二維陣列
        let gameOver = false;
        let cellsRevealed = 0;
        let flagsPlaced = 0;
        let timer = 0;
        let timerInterval = null;
        let clickMode = 'dig'; // 'dig' 或 'flag'

        // UI 元素快取
        const introScreen = document.getElementById('intro-screen');
        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        
        const mineCountInput = document.getElementById('mine-count-input');
        const inputRow = document.getElementById('input-row');
        const inputCol = document.getElementById('input-col');
        const btnAddMine = document.getElementById('add-mine-btn');
        const mineList = document.getElementById('mine-list');
        const setupError = document.getElementById('setup-error');
        const mineProgress = document.getElementById('mine-progress');
        const btnStartGame = document.getElementById('start-game-btn');
        
        const boardEl = document.getElementById('board');
        const minesLeftDisplay = document.getElementById('mines-left-display');
        const timerDisplay = document.getElementById('timer-display');
        
        const btnModeDig = document.getElementById('mode-dig');
        const btnModeFlag = document.getElementById('mode-flag');

        const gameOverModal = document.getElementById('game-over-modal');

        /* --- 階段 0: 開場動畫處理 --- */
        window.onload = () => {
            // 3秒後淡出開場，進入設定畫面
            setTimeout(() => {
                introScreen.classList.add('fade-out');
                setTimeout(() => {
                    introScreen.classList.add('hidden');
                    setupScreen.classList.remove('hidden');
                }, 1000);
            }, 3000);
        };

        /* --- 階段 1: 設定階段邏輯 --- */
        
        mineCountInput.addEventListener('change', (e) => {
            let val = parseInt(e.target.value);
            if (val < 1) val = 1;
            if (val > 99) val = 99;
            targetMineCount = val;
            e.target.value = val;
            updateSetupUI();
        });

        btnAddMine.addEventListener('click', () => {
            if (mineCoordinates.length >= targetMineCount) {
                showError("已達設定數量上限！");
                return;
            }

            const r = parseInt(inputRow.value);
            const c = parseInt(inputCol.value);

            if (isNaN(r) || isNaN(c) || r < 1 || r > 10 || c < 1 || c > 10) {
                showError("請輸入 1 到 10 之間的有效數字。");
                return;
            }

            // 轉為內部使用的 0-9 座標
            const internalR = r - 1;
            const internalC = c - 1;

            // 檢查是否重複
            const isDuplicate = mineCoordinates.some(mine => mine.row === internalR && mine.col === internalC);
            if (isDuplicate) {
                showError(`行 ${r}, 列 ${c} 已經有地雷了！`);
                return;
            }

            // 加入並更新 UI
            mineCoordinates.push({row: internalR, col: internalC});
            inputRow.value = '';
            inputCol.value = '';
            showError(""); // 清除錯誤
            updateSetupUI();
        });

        function removeMine(index) {
            mineCoordinates.splice(index, 1);
            updateSetupUI();
        }

        function showError(msg) {
            if (msg) {
                setupError.textContent = msg;
                setupError.classList.remove('hidden');
            } else {
                setupError.classList.add('hidden');
            }
        }

        function updateSetupUI() {
            mineProgress.textContent = `${mineCoordinates.length} / ${targetMineCount}`;
            
            // 更新清單
            mineList.innerHTML = '';
            if (mineCoordinates.length === 0) {
                mineList.innerHTML = '<li class="text-gray-500 text-center mt-10">尚未加入任何地雷</li>';
            } else {
                mineCoordinates.forEach((mine, idx) => {
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-white bg-opacity-5 px-3 py-2 rounded mb-1 border border-white border-opacity-5";
                    li.innerHTML = `
                        <span>地雷 ${idx + 1}：行 ${mine.row + 1}, 列 ${mine.col + 1}</span>
                        <button onclick="removeMine(${idx})" class="text-red-400 hover:text-red-300 px-2 py-1 bg-red-900 bg-opacity-30 rounded text-xs">刪除</button>
                    `;
                    mineList.appendChild(li);
                });
                // 捲動到底部
                mineList.parentElement.scrollTop = mineList.parentElement.scrollHeight;
            }

            // 檢查是否可開始遊戲 (只要有設定1顆地雷以上就能開始)
            if (mineCoordinates.length > 0) {
                btnStartGame.disabled = false;
                btnStartGame.className = "w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-indigo-500/50 transform hover:scale-[1.02]";
                btnStartGame.textContent = "確認位置並開始遊戲";
            } else {
                btnStartGame.disabled = true;
                btnStartGame.className = "w-full bg-gray-600 text-gray-300 font-bold py-3 rounded-lg transition-all cursor-not-allowed";
                btnStartGame.textContent = "請至少設定1顆地雷";
            }
        }

        btnStartGame.addEventListener('click', () => {
            // 自動將目標地雷數設定為玩家實際擺放的地雷數量
            targetMineCount = mineCoordinates.length;
            
            setupScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            initGame();
        });


        /* --- 階段 2: 遊戲階段邏輯 --- */

        // 模式切換器
        function setMode(mode) {
            clickMode = mode;
            if (mode === 'dig') {
                btnModeDig.className = "flex-1 py-1.5 rounded-md bg-indigo-500 text-white font-bold transition-all shadow-lg text-sm";
                btnModeFlag.className = "flex-1 py-1.5 rounded-md text-gray-400 font-bold transition-all text-sm hover:bg-white hover:bg-opacity-5";
            } else {
                btnModeFlag.className = "flex-1 py-1.5 rounded-md bg-red-500 text-white font-bold transition-all shadow-lg text-sm";
                btnModeDig.className = "flex-1 py-1.5 rounded-md text-gray-400 font-bold transition-all text-sm hover:bg-white hover:bg-opacity-5";
            }
        }
        btnModeDig.addEventListener('click', () => setMode('dig'));
        btnModeFlag.addEventListener('click', () => setMode('flag'));

        function initGame() {
            // 初始化變數
            gameOver = false;
            cellsRevealed = 0;
            flagsPlaced = 0;
            timer = 0;
            clearInterval(timerInterval);
            timerDisplay.textContent = "000";
            updateMinesLeft();
            boardEl.innerHTML = '';
            boardEl.classList.remove('shake');
            gameOverModal.classList.add('hidden');

            // 建立邏輯網格
            boardData = [];
            for (let r = 0; r < ROWS; r++) {
                let rowArray = [];
                for (let c = 0; c < COLS; c++) {
                    rowArray.push({
                        isMine: false,
                        isRevealed: false,
                        isFlagged: false,
                        neighborMines: 0,
                        row: r,
                        col: c
                    });
                }
                boardData.push(rowArray);
            }

            // 佈置使用者設定的地雷
            mineCoordinates.forEach(mine => {
                boardData[mine.row][mine.col].isMine = true;
            });

            // 計算周圍數字
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (!boardData[r][c].isMine) {
                        let count = 0;
                        // 檢查周圍 8 宮格
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                let nr = r + dr;
                                let nc = c + dc;
                                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                                    if (boardData[nr][nc].isMine) count++;
                                }
                            }
                        }
                        boardData[r][c].neighborMines = count;
                    }
                }
            }

            // 渲染 DOM
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.className = 'cell';
                    cellEl.dataset.row = r;
                    cellEl.dataset.col = c;
                    
                    // 事件綁定 (左鍵/觸控點擊)
                    cellEl.addEventListener('click', () => handleCellClick(r, c));
                    
                    // 電腦版右鍵插旗
                    cellEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        if (!gameOver) handleFlag(r, c);
                    });

                    boardEl.appendChild(cellEl);
                }
            }

            // 開始計時
            timerInterval = setInterval(() => {
                if(!gameOver) {
                    timer++;
                    timerDisplay.textContent = timer.toString().padStart(3, '0');
                }
            }, 1000);
        }

        function getCellEl(r, c) {
            return document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
        }

        function updateMinesLeft() {
            const left = targetMineCount - flagsPlaced;
            minesLeftDisplay.textContent = left;
        }

        function handleCellClick(r, c) {
            if (gameOver || boardData[r][c].isRevealed) return;

            if (clickMode === 'flag') {
                handleFlag(r, c);
            } else {
                // Dig mode
                if (boardData[r][c].isFlagged) return; // 有插旗保護不可挖

                if (boardData[r][c].isMine) {
                    triggerGameOver(false);
                } else {
                    revealCell(r, c);
                    checkWinCondition();
                }
            }
        }

        function handleFlag(r, c) {
            if (gameOver || boardData[r][c].isRevealed) return;

            const cell = boardData[r][c];
            const el = getCellEl(r, c);

            if (!cell.isFlagged) {
                if (flagsPlaced < targetMineCount) {
                    cell.isFlagged = true;
                    el.textContent = '🚩';
                    flagsPlaced++;
                }
            } else {
                cell.isFlagged = false;
                el.textContent = '';
                flagsPlaced--;
            }
            updateMinesLeft();
        }

        function revealCell(r, c) {
            const cell = boardData[r][c];
            if (cell.isRevealed || cell.isFlagged) return;

            cell.isRevealed = true;
            cellsRevealed++;
            
            const el = getCellEl(r, c);
            el.classList.add('revealed');

            if (cell.neighborMines > 0) {
                el.textContent = cell.neighborMines;
                el.classList.add(`text-num-${cell.neighborMines}`);
            } else {
                // 若為 0 (空白)，則自動擴散周圍
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let nr = r + dr;
                        let nc = c + dc;
                        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                            revealCell(nr, nc);
                        }
                    }
                }
            }
        }

        function triggerGameOver(isWin) {
            gameOver = true;
            clearInterval(timerInterval);

            // 顯示所有地雷
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (boardData[r][c].isMine) {
                        const el = getCellEl(r, c);
                        el.classList.add('revealed');
                        if (!boardData[r][c].isFlagged) {
                            el.textContent = '💣';
                            el.classList.add('mine');
                        }
                    } else if (boardData[r][c].isFlagged) {
                        // 標錯的旗子
                        const el = getCellEl(r, c);
                        el.textContent = '❌';
                    }
                }
            }

            const modalContent = document.getElementById('modal-content');
            
            if (!isWin) {
                // 爆炸特效
                boardEl.classList.add('shake');
                document.getElementById('modal-icon').textContent = '💥';
                document.getElementById('modal-title').textContent = '踩到地雷了！';
                document.getElementById('modal-title').className = 'text-3xl font-bold mb-2 text-red-400';
                document.getElementById('modal-msg').textContent = '遊戲結束，整個區域發生爆炸。';
            } else {
                // 勝利特效
                document.getElementById('modal-icon').textContent = '🎉';
                document.getElementById('modal-title').textContent = '任務完成！';
                document.getElementById('modal-title').className = 'text-3xl font-bold mb-2 text-green-400';
                document.getElementById('modal-msg').textContent = `恭喜過關！耗時 ${timer} 秒，成功避開所有地雷。`;
            }

            // 顯示視窗 (稍微延遲讓玩家看到爆炸)
            setTimeout(() => {
                gameOverModal.classList.remove('hidden');
                setTimeout(() => {
                    modalContent.classList.remove('scale-95');
                    modalContent.classList.add('scale-100');
                }, 10);
            }, isWin ? 500 : 800);
        }

        function checkWinCondition() {
            // 勝利條件：所有非地雷格子都已被翻開
            const totalSafeCells = (ROWS * COLS) - targetMineCount;
            if (cellsRevealed === totalSafeCells) {
                // 將剩餘地雷自動插旗
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (boardData[r][c].isMine && !boardData[r][c].isFlagged) {
                            handleFlag(r, c);
                        }
                    }
                }
                triggerGameOver(true);
            }
        }

        /* --- 系統重置功能 --- */
        function resetToSetup() {
            // 重置資料
            mineCoordinates = [];
            targetMineCount = parseInt(mineCountInput.value) || 10;
            
            // 隱藏遊戲區與 Modal，顯示設定區
            gameOverModal.classList.add('hidden');
            gameScreen.classList.add('hidden');
            setupScreen.classList.remove('hidden');
            
            // 更新 UI
            updateSetupUI();
            setMode('dig');
        }

    </script>
</body>
</html>
